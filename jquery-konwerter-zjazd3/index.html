<!DOCTYPE html>
<html lang="pl-PL">

<head>
    <meta charset="UTF-8">
    <title>Konwerter - jquery</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <section>

        <h2>Converter</h2>

        <form class="converter">

            <label for="t1">Celsius</label>

            <input id="t1" name="temp1" type="number" required>

            <input type="submit" value="⇆">

            <label for="t2">Fahrenheit</label>

            <input id="t2" name="temp2" type="number" required>

        </form>

    </section>

    <script src="js/jquery.min.js"></script>

    <script src="js/main.js"></script>
    <!--    -->
</body>

</html>
