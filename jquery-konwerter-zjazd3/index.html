<!DOCTYPE html>
<html lang="pl-PL">

<head>
    <meta charset="UTF-8">
    <title>Konwerter - jquery</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <section>

        <form class="converter">

            <div id="master-container">

                <h2>Converter</h2>

                <div id="place-one" class="inline-class switching-dblclick">

                    <div class="celsius-div inline-class">

                        <label for="t1">Celsius</label>

                        <input id="t1" class="first-position" name="temp1" type="number" step="any">

                    </div>

                </div>

                <input type="submit" value="⇆">

                <div id="place-two" class="inline-class switching-dblclick">

                    <div class="fahrenheit-div inline-class">

                        <label for="t2">Fahrenheit</label>

                        <input id="t2" class="first-position" name="temp2" type="number" step="any" disabled="true">
                        <!-- step="0.1" pozwala określić ilość miejsc po przecinku-->
                        <!--       step="any" pozwala podać każdą wartość, a po naciśnięciu strzałki wartości przesuwają się o jeden-->

                    </div>

                </div>

            </div>

        </form>


        <div id="code-key">

            <!--Input potrzebny do szukania kodu znaków na klawiaturze-->
            <input id="searchingForLetter" name="letterSearch">

        </div>

    </section>

    <script src="js/jquery.min.js"></script>

    <script src="js/main.js"></script>
    <!--    -->
</body>

</html>
